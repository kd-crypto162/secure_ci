stages:
  - lint
  - test
  - sast
  - docker

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .gradle/wrapper
    - .gradle/caches

default:
  image: gradle:8.11.1-jdk17
  before_script:
    - cd assignment-1/app

lint:
  stage: lint
  script:
    - gradle --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - assignment-1/app/build/reports/checkstyle/

test:
  stage: test
  script:
    - gradle --no-daemon test jacocoTestReport
  artifacts:
    when: always
    paths:
      - assignment-1/app/build/reports/jacoco/test/html/
      - assignment-1/app/build/test-results/

sast_spotbugs:
  stage: sast
  script:
    - gradle --no-daemon spotbugsMain
  artifacts:
    when: always
    paths:
      - assignment-1/app/build/reports/spotbugs/

docker_build:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - cd assignment-1/app
  script:
    - docker build -t secureci-app:ci .

