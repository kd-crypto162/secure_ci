name: Assignment 1 - Secure CI

on:
  pull_request:
    paths:
      - "assignment-1/**"
      - ".github/workflows/assignment-1-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "assignment-1/**"
      - ".github/workflows/assignment-1-ci.yml"
permissions:
  contents: read
jobs:
  build-test-sast:
    name: Build, test, coverage, SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assignment-1/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:

          gradle-version: '8.11.1'

      - name: Lint + test + coverage + SpotBugs
        shell: bash
        run: |
          set +e
          gradle --no-daemon --console=plain check jacocoTestReport > gradle.log 2>&1
          code=$?
          echo "---- gradle.log (last 200 lines) ----"
          tail -n 200 gradle.log || true
          exit $code

      - name: Upload reports (Checkstyle / JaCoCo / SpotBugs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assignment-1-reports
          path: |
            assignment-1/app/build/reports/**
            assignment-1/app/build/test-results/**
            assignment-1/app/gradle.log
  docker-build:
    name: Docker build (hardened image)
    runs-on: ubuntu-latest
    needs: [build-test-sast]
    defaults:
      run:
        working-directory: assignment-1/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: assignment-1/app
          file: assignment-1/app/Dockerfile
          push: false
          tags: secureci-app:ci